<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Booking - Smart Health Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--serif-font-body, "Source Sans Pro", "Segoe UI", Arial, sans-serif);
            background: linear-gradient(135deg, rgba(5, 22, 48, 0.55) 0%, rgba(7, 51, 99, 0.32) 52%, rgba(8, 15, 36, 0.5) 100%), url('/static/images/module-bg.avif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 0;
            color-scheme: light;
        }

        .container {
            width: 100%;
            max-width: none;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.82) 0%, rgba(250, 245, 250, 0.78) 100%);
            border-radius: 0;
            padding: 2rem;
            box-shadow: none;
            backdrop-filter: blur(4px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #FF006E 0%, #00D9FF 100%) 1;
            padding-bottom: 1.5rem;
        }

        .header h1 {
            background: linear-gradient(135deg, #FF006E 0%, #00D9FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .back-btn {
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, #FF006E, #00D9FF);
            color: white;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-out;
            min-height: 44px;
        }

        .back-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 0, 110, 0.3);
        }

        .more-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.2rem;
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(0, 217, 255, 0.1));
            color: #FF006E;
            border: 2px solid #FF006E;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease-out;
            min-height: 44px;
        }

        .more-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 0, 110, 0.2);
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.15), rgba(0, 217, 255, 0.15));
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--serif-border, #e8e4df);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--serif-muted-foreground, #6b6b6b);
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease-out;
            font-weight: 500;
        }

        .tab-btn.active {
            color: #FF006E;
            border-bottom-color: #FF006E;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--serif-border, #e8e4df);
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #FF006E;
            box-shadow: 0 0 0 2px rgba(255, 0, 110, 0.18);
        }

        .filter-select {
            padding: 0.9rem;
            border: 1px solid var(--serif-border, #e8e4df);
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #FF006E;
        }

        .recommendation-banner {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.05), rgba(0, 217, 255, 0.05));
            border: 1px solid rgba(255, 0, 110, 0.2);
            border-left: 3px solid #FF006E;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .recommendation-banner h3 {
            color: var(--serif-foreground, #1a1a1a);
            font-family: var(--serif-font-display, Georgia, serif);
            margin-bottom: 0.5rem;
        }

        .recommendation-banner p {
            color: #424242;
            line-height: 1.6;
        }

        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .doctor-card {
            background: white;
            border: 1px solid var(--serif-border, #e8e4df);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s ease-out;
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.06);
        }

        .doctor-card:hover {
            border-color: color-mix(in srgb, var(--serif-accent, #FF006E), white 50%);
            box-shadow: 0 8px 24px rgba(26, 26, 26, 0.08);
            transform: translateY(-2px);
        }

        .doctor-header {
            background: linear-gradient(135deg, #FF006E 0%, #4d7cff 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .doctor-avatar {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .doctor-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .doctor-specialty {
            opacity: 0.9;
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }

        .doctor-body {
            padding: 1.5rem;
        }

        .doctor-rating {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .stars {
            color: #ffc107;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .rating-value {
            background: var(--serif-accent, #FF006E);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .doctor-info {
            margin-bottom: 1rem;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.7rem;
            font-size: 0.95rem;
            color: #555;
        }

        .info-icon {
            font-size: 1.2rem;
            min-width: 24px;
        }

        .experience {
            color: var(--serif-accent, #FF006E);
            font-weight: 600;
        }

        .fee {
            color: #4caf50;
            font-weight: 600;
        }

        .doctor-footer {
            display: flex;
            gap: 1rem;
        }

        .book-btn, .view-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .book-btn {
            background: var(--serif-accent, #FF006E);
            color: white;
        }

        .book-btn:hover {
            transform: translateY(-1px);
            background: var(--serif-accent-secondary, #4d7cff);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.06);
        }

        .view-btn {
            background: #f0f0f0;
            color: #333;
        }

        .view-btn:hover {
            background: #e0e0e0;
        }

        .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem;
        }

        .booking-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .booking-form-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .booking-form-header {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .booking-form-header h2 {
            color: #333;
            margin-bottom: 0.3rem;
        }

        .booking-form-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--serif-border, #e8e4df);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--serif-accent, #FF006E);
            box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.18);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        .time-slot {
            padding: 0.8rem;
            border: 1px solid var(--serif-border, #e8e4df);
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .time-slot:hover {
            border-color: var(--serif-accent, #FF006E);
            background: var(--serif-muted, #f5f3f0);
        }

        .time-slot.selected {
            background: var(--serif-accent, #FF006E);
            color: white;
            border-color: var(--serif-accent, #FF006E);
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
        }

        .submit-btn, .close-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn {
            background: var(--serif-accent, #FF006E);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            background: var(--serif-accent-secondary, #4d7cff);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.06);
        }

        .close-btn {
            background: #f0f0f0;
            color: #333;
        }

        .close-btn:hover {
            background: #e0e0e0;
        }

        .appointments-list {
            display: grid;
            gap: 1.5rem;
        }

        .appointment-card {
            background: white;
            border: 1px solid var(--serif-border, #e8e4df);
            padding: 1.5rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.06);
        }

        .appointment-card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .appointment-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .appointment-avatar {
            font-size: 2.5rem;
        }

        .appointment-info h3 {
            color: #333;
            margin-bottom: 0.3rem;
        }

        .appointment-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .appointment-status {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .appointment-actions {
            display: flex;
            gap: 1rem;
        }

        .cancel-btn {
            padding: 0.6rem 1.5rem;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .cancel-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .doctor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            overflow-y: auto;
            padding: 2rem;
        }

        .doctor-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .doctor-detail-modal {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .detail-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 1rem;
        }

        .detail-avatar {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        .detail-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .detail-specialty {
            color: #666;
            font-size: 1rem;
        }

        .detail-content {
            margin-bottom: 2rem;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-section h3 {
            color: var(--serif-accent, #FF006E);
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .section-label {
            font-family: var(--serif-font-mono, monospace);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--serif-accent, #FF006E);
            margin-bottom: 0.75rem;
            display: inline-block;
        }

        .detail-section p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .reviews-list {
            display: grid;
            gap: 1rem;
        }

        .review-item {
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 6px;
            border-left: 3px solid #ffc107;
        }

        .review-author {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .review-rating {
            color: #ffc107;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .review-text {
            color: #666;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .doctors-grid {
                grid-template-columns: 1fr;
            }

            .appointment-details {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }
    
        /* ===== REAL-TIME ANIMATIONS ===== */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 110, 0.3), 0 0 20px rgba(0, 217, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.6), 0 0 30px rgba(0, 217, 255, 0.4); }
        }

        @keyframes slide-in-top {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slide-in-bottom {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-smooth {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes real-time-pulse {
            0%, 100% { 
                box-shadow: 0 0 8px rgba(255, 0, 110, 0.4), inset 0 0 8px rgba(0, 217, 255, 0.1);
            }
            50% { 
                box-shadow: 0 0 16px rgba(255, 0, 110, 0.6), inset 0 0 12px rgba(0, 217, 255, 0.2);
            }
        }

        @keyframes status-indicator {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Real-time enhanced styles */
        .header {
            animation: slide-in-top 0.6s ease-out;
        }

        .card, .alert-item, .event-card, .status-box, .metric-card {
            animation: slide-in-bottom 0.5s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }

        .status-badge {
            animation: real-time-pulse 1.5s ease-in-out infinite;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(0, 217, 255, 0.15);
            border: 1px solid #00D9FF;
            color: #00D9FF;
        }

        .status-badge.alert {
            background: rgba(255, 0, 110, 0.15);
            border: 1px solid #FF006E;
            color: #FF006E;
        }

        .status-badge.warning {
            background: rgba(255, 165, 0, 0.15);
            border: 1px solid #FFA500;
            color: #FFA500;
        }

        .button-group button, button.action-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .button-group button:hover, button.action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.3);
        }

        .button-group button:active, button.action-btn:active {
            transform: translateY(-1px);
        }

        /* Gradient backgrounds */
        .gradient-card {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.05) 0%, rgba(0, 217, 255, 0.05) 100%);
            border: 1px solid rgba(255, 0, 110, 0.1);
        }

        .gradient-card:hover {
            border-color: rgba(0, 217, 255, 0.3);
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.08) 0%, rgba(0, 217, 255, 0.08) 100%);
        }

        /* Real-time indicator dot */
        .real-time-dot::before {
            content: '●';
            display: inline-block;
            color: #00D9FF;
            animation: status-indicator 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }

        /* Smooth transitions for all interactive elements */
        * {
            transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF006E !important;
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1), 0 0 12px rgba(0, 217, 255, 0.2) !important;
        }

    </style>

</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>👨‍⚕️ Find & Book a Doctor</h1>
            <div class="header-actions">
                <a class="more-btn" href="https://www.practo.com/?utm_source=opd_google&utm_medium=156227283291&utm_campaign=20298938780&gad_source=1&gad_campaignid=20298938780&gbraid=0AAAAADgl2cKZ1ZdjUWHe2YUZSGpb63U8G&gclid=CjwKCAiAh5XNBhAAEiwA_Bu8FZQdhuSs68OBXKxiEZ_JLwKj65YgzgpPrfrkOViq2urWZuE-7n2-9hoC0ngQAvD_BwE" target="_blank" rel="noopener noreferrer">Click More</a>
                <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
            </div>
        </div>

        <!-- Alerts -->
        <div id="alert-success" class="alert alert-success"></div>
        <div id="alert-error" class="alert alert-error"></div>

        <!-- Recommendation Banner -->
        <div id="recommendation-banner" class="recommendation-banner" style="display: none;">
            <span class="section-label">Smart Match</span>
            <h3>🎯 Recommended for You</h3>
            <p id="recommendation-text"></p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('available')">👨‍⚕️ Available Doctors</button>
            <button class="tab-btn" onclick="switchTab('appointments')">📅 My Appointments</button>
        </div>

        <!-- Available Doctors Tab -->
        <div id="available" class="tab-content active">
            <!-- Search and Filter -->
            <div class="search-filter">
                <div class="search-box">
                    <input type="text" id="search-doctors" placeholder="🔍 Search by name or specialty..." onkeyup="filterDoctors()">
                </div>
                <select class="filter-select" id="specialty-filter" onchange="filterDoctors()">
                    <option value="">All Specialties</option>
                    <option value="Cardiologist">Cardiologist</option>
                    <option value="Neurologist">Neurologist</option>
                    <option value="General Physician">General Physician</option>
                    <option value="Dentist">Dentist</option>
                    <option value="Dermatologist">Dermatologist</option>
                </select>
            </div>

            <div id="doctors-container" class="doctors-grid">
                <p style="color: #999; grid-column: 1/-1; text-align: center; padding: 2rem;">Loading doctors...</p>
            </div>
        </div>

        <!-- My Appointments Tab -->
        <div id="appointments" class="tab-content">
            <div id="appointments-container" class="appointments-list">
                <p style="color: #999; text-align: center; padding: 2rem;">Loading appointments...</p>
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="booking-modal">
        <div class="booking-form-container">
            <div class="booking-form-header">
                <h2>Schedule Appointment</h2>
                <p id="selected-doctor-name"></p>
            </div>
            <form id="booking-form">
                <input type="hidden" id="doctor-id">

                <div class="form-group">
                    <label>📅 Select Date</label>
                    <input type="date" id="appointment-date" required>
                </div>

                <div class="form-group">
                    <label>⏰ Select Time Slot</label>
                    <div class="time-slots" id="time-slots-container">
                        Loading...
                    </div>
                </div>

                <div class="form-group">
                    <label>📋 Consultation Type</label>
                    <select id="consultation-type" required>
                        <option value="">Select Type</option>
                        <option value="General Checkup">General Checkup</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Urgent">Urgent</option>
                        <option value="Preventive Care">Preventive Care</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>💬 Additional Notes (Optional)</label>
                    <textarea id="appointment-notes" placeholder="Describe your symptoms or concerns..."></textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="submit-btn">✅ Confirm Booking</button>
                    <button type="button" class="close-btn" onclick="closeBookingModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Doctor Detail Modal -->
    <div id="doctor-modal" class="doctor-modal">
        <div class="doctor-detail-modal">
            <div class="detail-header">
                <div class="detail-avatar" id="detail-avatar"></div>
                <div class="detail-name" id="detail-name"></div>
                <div class="detail-specialty" id="detail-specialty"></div>
            </div>

            <div class="detail-content">
                <div class="detail-section">
                    <h3>📋 About</h3>
                    <p id="detail-about"></p>
                </div>

                <div class="detail-section">
                    <h3>🏥 Experience</h3>
                    <p id="detail-experience"></p>
                </div>

                <div class="detail-section">
                    <h3>💉 Qualifications</h3>
                    <p id="detail-qualifications"></p>
                </div>

                <div class="detail-section">
                    <h3>⭐ Reviews</h3>
                    <div class="reviews-list" id="detail-reviews"></div>
                </div>
            </div>

            <button class="book-btn" onclick="switchToBooking()" style="width: 100%;">Book Appointment</button>
            <button class="close-btn" onclick="closeDoctorModal()" style="width: 100%; margin-top: 1rem;">Close</button>
        </div>
    </div>

    <script>
        // Sample doctors data
        const sampleDoctors = [
            {
                id: 1,
                full_name: "Dr. Priya Sharma",
                specialization: "Cardiologist",
                rating: 4.8,
                reviews_count: 245,
                consultation_fee: "₹600",
                experience: "12 years",
                about: "Expert in cardiac care with specialization in heart disease prevention and treatment.",
                qualifications: "MBBS, MD (Internal Medicine), DM (Cardiology)",
                availability: "Mon-Fri: 10:00 AM - 6:00 PM",
                avatar: "👩‍⚕️",
                reviews: [
                    { author: "Rajesh K.", rating: "★★★★★", text: "Very professional and caring doctor. Highly recommended!" },
                    { author: "Anita S.", rating: "★★★★☆", text: "Great consultation. Explained everything clearly." },
                    { author: "Vikram P.", rating: "★★★★★", text: "Best cardiologist in the city!" }
                ]
            },
            {
                id: 2,
                full_name: "Dr. Arjun Patel",
                specialization: "General Physician",
                rating: 4.7,
                reviews_count: 312,
                consultation_fee: "₹400",
                experience: "10 years",
                about: "General physician with focus on preventive healthcare and chronic disease management.",
                qualifications: "MBBS, MD (General Medicine)",
                availability: "Mon-Sat: 9:00 AM - 5:00 PM",
                avatar: "👨‍⚕️",
                reviews: [
                    { author: "Neha M.", rating: "★★★★★", text: "Very friendly and attentive. Resolved my health issues quickly." },
                    { author: "Rahul T.", rating: "★★★★★", text: "Great doctor for general checkups." },
                    { author: "Priya R.", rating: "★★★★☆", text: "Good consultation, reasonable fees." }
                ]
            },
            {
                id: 3,
                full_name: "Dr. Kavya Singh",
                specialization: "Neurologist",
                rating: 4.9,
                reviews_count: 189,
                consultation_fee: "₹700",
                experience: "14 years",
                about: "Specialized neurologist treating migraine, epilepsy, and neurological disorders.",
                qualifications: "MBBS, MD (Neurology), Fellowship in Movement Disorders",
                availability: "Mon-Thu, Sat: 11:00 AM - 7:00 PM",
                avatar: "👩‍⚕️",
                reviews: [
                    { author: "Suresh V.", rating: "★★★★★", text: "Excellent diagnosis and treatment. My migraines are much better now!" },
                    { author: "Divya K.", rating: "★★★★★", text: "Very knowledgeable and patient." },
                    { author: "Anil M.", rating: "★★★★★", text: "Best neurologist I've consulted." }
                ]
            },
            {
                id: 4,
                full_name: "Dr. Deepak Kumar",
                specialization: "Dentist",
                rating: 4.6,
                reviews_count: 267,
                consultation_fee: "₹500",
                experience: "11 years",
                about: "Expert in cosmetic dentistry and dental implants with modern equipment.",
                qualifications: "BDS, MDS (Prosthodontics)",
                availability: "Tue-Sun: 10:00 AM - 8:00 PM",
                avatar: "👨‍⚕️",
                reviews: [
                    { author: "Riya L.", rating: "★★★★★", text: "Perfect smile makeover! Highly satisfied." },
                    { author: "Mohan S.", rating: "★★★★☆", text: "Professional and painless treatment." },
                    { author: "Sneha D.", rating: "★★★★★", text: "Best dental care in town!" }
                ]
            },
            {
                id: 5,
                full_name: "Dr. Meera Desai",
                specialization: "Dermatologist",
                rating: 4.8,
                reviews_count: 201,
                consultation_fee: "₹600",
                experience: "13 years",
                about: "Dermatologist specializing in skin disorders, acne treatment, and cosmetic procedures.",
                qualifications: "MBBS, MD (Dermatology), Fellowship in Cosmetic Dermatology",
                availability: "Mon, Wed, Fri-Sun: 2:00 PM - 7:00 PM",
                avatar: "👩‍⚕️",
                reviews: [
                    { author: "Anjali P.", rating: "★★★★★", text: "My acne problem is completely resolved!" },
                    { author: "Rohan B.", rating: "★★★★★", text: "Very effective treatment with great results." },
                    { author: "Pooja N.", rating: "★★★★☆", text: "Excellent dermatologist, skin looks much better." }
                ]
            }
        ];

        let currentDoctor = null;
        let appointments = [];

        // Initialize
        window.addEventListener('DOMContentLoaded', function() {
            loadDoctors();
            loadAppointments();
            setRecommendation();
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'appointments') {
                loadAppointments();
            }
        }

        function loadDoctors() {
            const container = document.getElementById('doctors-container');
            container.innerHTML = sampleDoctors.map(doc => `
                <div class="doctor-card">
                    <div class="doctor-header">
                        <div class="doctor-avatar">${doc.avatar}</div>
                        <div class="doctor-name">${doc.full_name}</div>
                        <div class="doctor-specialty">${doc.specialization}</div>
                    </div>
                    <div class="doctor-body">
                        <div class="doctor-rating">
                            <span class="stars">${'★'.repeat(Math.floor(doc.rating))}☆</span>
                            <span class="rating-value">${doc.rating}/5</span>
                        </div>
                        <div class="doctor-info">
                            <div class="info-row">
                                <span class="info-icon">👔</span>
                                <span class="experience">${doc.experience} experience</span>
                            </div>
                            <div class="info-row">
                                <span class="info-icon">💰</span>
                                <span class="fee">${doc.consultation_fee}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-icon">⏰</span>
                                <span>${doc.availability}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-icon">⭐</span>
                                <span>${doc.reviews_count} reviews</span>
                            </div>
                        </div>
                        <div class="doctor-footer">
                            <button class="book-btn" onclick="openBookingForm(${doc.id}, '${doc.full_name}')">Book Now</button>
                            <button class="view-btn" onclick="viewDoctorDetails(${doc.id})">View Profile</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterDoctors() {
            const searchTerm = document.getElementById('search-doctors').value.toLowerCase();
            const specialtyFilter = document.getElementById('specialty-filter').value;

            const filtered = sampleDoctors.filter(doc => {
                const matchesSearch = doc.full_name.toLowerCase().includes(searchTerm) || 
                                    doc.specialization.toLowerCase().includes(searchTerm);
                const matchesSpecialty = !specialtyFilter || doc.specialization === specialtyFilter;
                return matchesSearch && matchesSpecialty;
            });

            const container = document.getElementById('doctors-container');
            if (filtered.length === 0) {
                container.innerHTML = '<p style="color: #999; grid-column: 1/-1; text-align: center; padding: 2rem;">No doctors found matching your criteria.</p>';
            } else {
                container.innerHTML = filtered.map(doc => `
                    <div class="doctor-card">
                        <div class="doctor-header">
                            <div class="doctor-avatar">${doc.avatar}</div>
                            <div class="doctor-name">${doc.full_name}</div>
                            <div class="doctor-specialty">${doc.specialization}</div>
                        </div>
                        <div class="doctor-body">
                            <div class="doctor-rating">
                                <span class="stars">${'★'.repeat(Math.floor(doc.rating))}☆</span>
                                <span class="rating-value">${doc.rating}/5</span>
                            </div>
                            <div class="doctor-info">
                                <div class="info-row">
                                    <span class="info-icon">👔</span>
                                    <span class="experience">${doc.experience} experience</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-icon">💰</span>
                                    <span class="fee">${doc.consultation_fee}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-icon">⏰</span>
                                    <span>${doc.availability}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-icon">⭐</span>
                                    <span>${doc.reviews_count} reviews</span>
                                </div>
                            </div>
                            <div class="doctor-footer">
                                <button class="book-btn" onclick="openBookingForm(${doc.id}, '${doc.full_name}')">Book Now</button>
                                <button class="view-btn" onclick="viewDoctorDetails(${doc.id})">View Profile</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function viewDoctorDetails(doctorId) {
            const doctor = sampleDoctors.find(d => d.id === doctorId);
            if (!doctor) return;

            document.getElementById('detail-avatar').textContent = doctor.avatar;
            document.getElementById('detail-name').textContent = doctor.full_name;
            document.getElementById('detail-specialty').textContent = doctor.specialization;
            document.getElementById('detail-about').textContent = doctor.about;
            document.getElementById('detail-experience').textContent = `${doctor.experience} of experience in ${doctor.specialization}`;
            document.getElementById('detail-qualifications').textContent = doctor.qualifications;
            
            const reviewsHTML = doctor.reviews.map(review => `
                <div class="review-item">
                    <div class="review-author">${review.author}</div>
                    <div class="review-rating">${review.rating}</div>
                    <div class="review-text">"${review.text}"</div>
                </div>
            `).join('');
            document.getElementById('detail-reviews').innerHTML = reviewsHTML;

            currentDoctor = doctor;
            document.getElementById('doctor-modal').classList.add('active');
        }

        function closeDoctorModal() {
            document.getElementById('doctor-modal').classList.remove('active');
        }

        function switchToBooking() {
            closeDoctorModal();
            if (currentDoctor) {
                openBookingForm(currentDoctor.id, currentDoctor.full_name);
            }
        }

        function openBookingForm(doctorId, doctorName) {
            currentDoctor = sampleDoctors.find(d => d.id === doctorId);
            document.getElementById('doctor-id').value = doctorId;
            document.getElementById('selected-doctor-name').textContent = doctorName;
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('appointment-date').min = today;
            document.getElementById('appointment-date').value = today;

            generateTimeSlots();
            document.getElementById('booking-modal').classList.add('active');
        }

        function generateTimeSlots() {
            const slots = [
                '09:00 AM', '09:30 AM', '10:00 AM', '10:30 AM', '11:00 AM', '11:30 AM',
                '02:00 PM', '02:30 PM', '03:00 PM', '03:30 PM', '04:00 PM', '04:30 PM'
            ];

            document.getElementById('time-slots-container').innerHTML = slots.map(slot => `
                <div class="time-slot" onclick="selectTimeSlot(this, '${slot}')">${slot}</div>
            `).join('');
        }

        function selectTimeSlot(element, slot) {
            document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('appointment-time-value').value = slot;
        }

        function closeBookingModal() {
            document.getElementById('booking-modal').classList.remove('active');
        }

        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedSlot = document.querySelector('.time-slot.selected');
            if (!selectedSlot) {
                showAlert('error', '❌ Please select a time slot');
                return;
            }

            const appointment = {
                doctor_id: parseInt(document.getElementById('doctor-id').value),
                doctor_name: currentDoctor.full_name,
                appointment_date: document.getElementById('appointment-date').value,
                appointment_time: selectedSlot.textContent,
                consultation_type: document.getElementById('consultation-type').value,
                notes: document.getElementById('appointment-notes').value,
                status: 'Confirmed'
            };

            if (!appointments) appointments = [];
            appointments.push({
                ...appointment,
                id: Date.now()
            });

            localStorage.setItem('appointments', JSON.stringify(appointments));

            showAlert('success', `✅ Appointment booked with ${currentDoctor.full_name} on ${appointment.appointment_date} at ${appointment.appointment_time}`);
            
            document.getElementById('booking-form').reset();
            document.getElementById('booking-modal').classList.remove('active');
            loadAppointments();
        });

        function loadAppointments() {
            appointments = JSON.parse(localStorage.getItem('appointments')) || [];
            const container = document.getElementById('appointments-container');
            
            if (appointments.length === 0) {
                container.innerHTML = '<div class="empty-state">📅 No appointments booked yet.<br><br>Click "Book Now" to schedule your first appointment!</div>';
                return;
            }

            container.innerHTML = appointments.map(apt => `
                <div class="appointment-card">
                    <div class="appointment-header">
                        <div class="appointment-avatar">${sampleDoctors.find(d => d.id === apt.doctor_id)?.avatar || '👨‍⚕️'}</div>
                        <div class="appointment-info">
                            <h3>${apt.doctor_name}</h3>
                            <div class="appointment-details">
                                <div>📅 ${new Date(apt.appointment_date).toLocaleDateString()}</div>
                                <div>⏰ ${apt.appointment_time}</div>
                                <div>📋 ${apt.consultation_type}</div>
                                <div><span class="appointment-status ${apt.status === 'Confirmed' ? 'status-confirmed' : 'status-pending'}">${apt.status}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="appointment-actions">
                        <button class="cancel-btn" onclick="cancelAppointment(${apt.id})">Cancel Appointment</button>
                    </div>
                </div>
            `).join('');
        }

        function cancelAppointment(appointmentId) {
            if (!confirm('Are you sure you want to cancel this appointment?')) return;

            appointments = appointments.filter(apt => apt.id !== appointmentId);
            localStorage.setItem('appointments', JSON.stringify(appointments));

            showAlert('success', '✅ Appointment cancelled successfully.');
            loadAppointments();
        }

        function setRecommendation() {
            // Show recommendation banner
            const banner = document.getElementById('recommendation-banner');
            const recommendations = [
                { text: '💓 Based on your health profile, a Cardiologist checkup is recommended', doctor: 'Dr. Priya Sharma' },
                { text: '🧠 Your recent symptoms suggest consulting a Neurologist', doctor: 'Dr. Kavya Singh' },
                { text: '👨‍⚕️ Regular checkup with General Physician is important', doctor: 'Dr. Arjun Patel' }
            ];

            const rec = recommendations[Math.floor(Math.random() * recommendations.length)];
            document.getElementById('recommendation-text').textContent = rec.text;
            banner.style.display = 'block';
        }

        function showAlert(type, message) {
            const alertEl = document.getElementById(`alert-${type}`);
            alertEl.textContent = message;
            alertEl.style.display = 'block';
            setTimeout(() => {
                alertEl.style.display = 'none';
            }, 5000);
        }

        function goBack() {
            window.location.href = '/dashboard';
        }

        // Add hidden input for time value
        const form = document.getElementById('booking-form');
        const timeInput = document.createElement('input');
        timeInput.type = 'hidden';
        timeInput.id = 'appointment-time-value';
        form.appendChild(timeInput);
    </script>
</body>
</html>

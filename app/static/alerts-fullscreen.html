<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Alerts - Smart Health Monitor</title>
    <style>
        :root {
            --color-1: #FF006E;
            --color-2: #00D9FF;
            --color-1-light: #FF3BA0;
            --color-2-light: #00F5FF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--serif-font-body, "Source Sans Pro", "Segoe UI", Arial, sans-serif);
            background: linear-gradient(135deg, rgba(5, 22, 48, 0.55) 0%, rgba(7, 51, 99, 0.32) 52%, rgba(8, 15, 36, 0.5) 100%), url('/static/images/module-bg.avif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 0;
            color-scheme: light;
        }

        .container {
            width: 100%;
            max-width: none;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.82) 0%, rgba(250, 245, 250, 0.78) 100%);
            border-radius: 0;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(255, 0, 110, 0.1);
            backdrop-filter: blur(4px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #FF006E 0%, #00D9FF 100%) 1;
            padding-bottom: 1rem;
        }

        .header h1 {
            background: linear-gradient(135deg, #FF006E 0%, #00D9FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
        }

        .back-btn {
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, #FF006E, #00D9FF);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: #666;
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #FF006E;
            border-bottom-color: #FF006E;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .alerts-list {
            display: grid;
            gap: 1.5rem;
        }

        .alert-card {
            border-left: 5px solid;
            padding: 1.5rem;
            border-radius: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .alert-critical {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .alert-warning {
            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .alert-info {
            border-left-color: #2196f3;
            background: #e3f2fd;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .alert-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .alert-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-critical {
            background: linear-gradient(135deg, #FF006E, #FF3BA0);
            color: white;
        }

        .badge-warning {
            background: linear-gradient(135deg, #FFB800, #FF9500);
            color: white;
        }

        .badge-info {
            background: linear-gradient(135deg, #00D9FF, #00F5FF);
            color: white;
        }

        .alert-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .alert-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .detail-item {
            background: rgba(0,0,0,0.05);
            padding: 0.8rem;
            border-radius: 6px;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.2rem;
        }

        .alert-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF006E, #00D9FF);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.35);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--serif-accent, #FF006E);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .recommendations {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 2rem;
        }

        .recommendations h3 {
            color: #1976d2;
            margin-bottom: 1rem;
        }

        .rec-item {
            margin-bottom: 0.8rem;
            color: #333;
            line-height: 1.5;
        }

        .rec-item:before {
            content: "✓ ";
            color: #4caf50;
            font-weight: bold;
            margin-right: 0.5rem;
        }
    
        /* ===== REAL-TIME ANIMATIONS ===== */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 110, 0.3), 0 0 20px rgba(0, 217, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.6), 0 0 30px rgba(0, 217, 255, 0.4); }
        }

        @keyframes slide-in-top {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slide-in-bottom {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-smooth {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes real-time-pulse {
            0%, 100% { 
                box-shadow: 0 0 8px rgba(255, 0, 110, 0.4), inset 0 0 8px rgba(0, 217, 255, 0.1);
            }
            50% { 
                box-shadow: 0 0 16px rgba(255, 0, 110, 0.6), inset 0 0 12px rgba(0, 217, 255, 0.2);
            }
        }

        @keyframes status-indicator {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Real-time enhanced styles */
        .header {
            animation: slide-in-top 0.6s ease-out;
        }

        .card, .alert-item, .event-card, .status-box, .metric-card {
            animation: slide-in-bottom 0.5s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }

        .status-badge {
            animation: real-time-pulse 1.5s ease-in-out infinite;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(0, 217, 255, 0.15);
            border: 1px solid #00D9FF;
            color: #00D9FF;
        }

        .status-badge.alert {
            background: rgba(255, 0, 110, 0.15);
            border: 1px solid #FF006E;
            color: #FF006E;
        }

        .status-badge.warning {
            background: rgba(255, 165, 0, 0.15);
            border: 1px solid #FFA500;
            color: #FFA500;
        }

        .button-group button, button.action-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .button-group button:hover, button.action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.3);
        }

        .button-group button:active, button.action-btn:active {
            transform: translateY(-1px);
        }

        /* Gradient backgrounds */
        .gradient-card {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.05) 0%, rgba(0, 217, 255, 0.05) 100%);
            border: 1px solid rgba(255, 0, 110, 0.1);
        }

        .gradient-card:hover {
            border-color: rgba(0, 217, 255, 0.3);
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.08) 0%, rgba(0, 217, 255, 0.08) 100%);
        }

        /* Real-time indicator dot */
        .real-time-dot::before {
            content: '●';
            display: inline-block;
            color: #00D9FF;
            animation: status-indicator 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }

        /* Smooth transitions for all interactive elements */
        * {
            transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF006E !important;
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1), 0 0 12px rgba(0, 217, 255, 0.2) !important;
        }

    </style>
    <link rel="stylesheet" href="/static/css/serif-design-system.css">
    <link rel="stylesheet" href="/static/css/advanced-design-system.css">
    <link rel="stylesheet" href="/static/css/advanced-components.css">
    <script defer src="/static/js/advanced-utilities.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚨 Health Alerts</h1>
            <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-alerts">0</div>
                <div class="stat-label">Total Alerts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="critical-alerts">0</div>
                <div class="stat-label">Critical</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="warning-alerts">0</div>
                <div class="stat-label">Warnings</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('active')">Active Alerts</button>
            <button class="tab-btn" onclick="switchTab('resolved')">Resolved</button>
        </div>

        <!-- Active Alerts Tab -->
        <div id="active" class="tab-content active">
            <div id="active-alerts" class="alerts-list">
                <p style="color: #999; text-align: center; padding: 2rem;">Loading alerts...</p>
            </div>
        </div>

        <!-- Resolved Alerts Tab -->
        <div id="resolved" class="tab-content">
            <div id="resolved-alerts" class="alerts-list">
                <p style="color: #999; text-align: center; padding: 2rem;">Loading alerts...</p>
            </div>
        </div>

        <!-- Recommendations -->
        <div class="recommendations" id="recommendations-section" style="display: none;">
            <h3>📋 Recommendations</h3>
            <div id="recommendations-list"></div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            loadAlerts();
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function loadAlerts() {
            fetch('/api/alerts')
                .then(r => r.json())
                .then(data => {
                    const alerts = data.alerts || [];
                    let activeAlerts = [];
                    let resolvedAlerts = [];
                    let criticalCount = 0;
                    let warningCount = 0;

                    alerts.forEach(alert => {
                        if (alert.status === 'Resolved') {
                            resolvedAlerts.push(alert);
                        } else {
                            activeAlerts.push(alert);
                            if (alert.severity === 'Critical') criticalCount++;
                            else if (alert.severity === 'Warning') warningCount++;
                        }
                    });

                    // Update stats
                    document.getElementById('total-alerts').textContent = alerts.length;
                    document.getElementById('critical-alerts').textContent = criticalCount;
                    document.getElementById('warning-alerts').textContent = warningCount;

                    // Render active alerts
                    renderAlerts(activeAlerts, 'active-alerts');
                    
                    // Render resolved alerts
                    renderAlerts(resolvedAlerts, 'resolved-alerts');

                    // Show recommendations if there are critical/warning alerts
                    if (activeAlerts.length > 0) {
                        showRecommendations(activeAlerts);
                    }
                })
                .catch(e => console.error('Error loading alerts:', e));
        }

        function renderAlerts(alerts, containerId) {
            const container = document.getElementById(containerId);
            
            if (alerts.length === 0) {
                container.innerHTML = '<div class="empty-state">No alerts</div>';
                return;
            }

            container.innerHTML = alerts.map(alert => {
                const severity = alert.severity.toLowerCase();
                return `
                    <div class="alert-card alert-${severity}">
                        <div class="alert-header">
                            <div>
                                <div class="alert-title">${getAlertIcon(alert.severity)} ${alert.alert_type}</div>
                            </div>
                            <span class="alert-badge badge-${severity}">${alert.severity}</span>
                        </div>
                        <div class="alert-content">${alert.message}</div>
                        <div class="alert-details">
                            <div class="detail-item">
                                <div class="detail-label">Parameter</div>
                                <div>${alert.parameter_name}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Value</div>
                                <div>${alert.parameter_value} ${alert.unit}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Time</div>
                                <div>${new Date(alert.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        ${alert.status === 'Active' ? `
                            <div class="alert-actions">
                                <button class="btn btn-primary" onclick="acknowledgeAlert(${alert.id})">
                                    Acknowledge
                                </button>
                                <button class="btn btn-secondary" onclick="dismissAlert(${alert.id})">
                                    Dismiss
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function getAlertIcon(severity) {
            switch(severity) {
                case 'Critical': return '🔴';
                case 'Warning': return '⚠️';
                default: return 'ℹ️';
            }
        }

        function acknowledgeAlert(alertId) {
            fetch(`/api/alerts/${alertId}/acknowledge`, {
                method: 'POST'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success || data.message) {
                    loadAlerts();
                }
            })
            .catch(e => console.error('Error acknowledging alert:', e));
        }

        function dismissAlert(alertId) {
            fetch(`/api/alerts/${alertId}/dismiss`, {
                method: 'POST'
            })
            .then(r => r.json())
            .then(data => {
                if (data.success || data.message) {
                    loadAlerts();
                }
            })
            .catch(e => console.error('Error dismissing alert:', e));
        }

        function showRecommendations(activeAlerts) {
            document.getElementById('recommendations-section').style.display = 'block';
            const recommendations = [];

            activeAlerts.forEach(alert => {
                if (alert.severity === 'Critical') {
                    if (alert.parameter_name === 'Heart Rate' && parseFloat(alert.parameter_value) > 120) {
                        recommendations.push('Rest immediately and take slow, deep breaths to calm your heart rate.');
                    } else if (alert.parameter_name === 'Blood Pressure' && parseFloat(alert.parameter_value) > 160) {
                        recommendations.push('Seek medical attention for significantly elevated blood pressure.');
                    }
                }
            });

            if (recommendations.length === 0) {
                recommendations.push('Monitor your health closely and follow up with your doctor.');
                recommendations.push('Maintain a healthy lifestyle with proper diet and exercise.');
            }

            document.getElementById('recommendations-list').innerHTML = recommendations
                .map(rec => `<div class="rec-item">${rec}</div>`)
                .join('');
        }

        function goBack() {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>

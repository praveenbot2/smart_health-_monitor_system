<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events & Reminders - Smart Health Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #ff006e;
      --secondary: #00d9ff;
      --bg: #f4f7fb;
      --surface: rgba(255, 255, 255, 0.96);
      --border: #e6eaf6;
      --text: #273047;
      --muted: #64748b;
      --shadow: 0 16px 34px rgba(22, 28, 45, 0.08);
      --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(5, 22, 48, 0.56) 0%, rgba(7, 51, 99, 0.36) 52%, rgba(8, 15, 36, 0.54) 100%),
        url('/static/images/module-bg.avif');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .topbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-btn, .ghost-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s ease;
    }

    .back-btn:hover, .ghost-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 0, 110, 0.25);
      box-shadow: 0 8px 18px rgba(22, 28, 45, 0.08);
    }

    .title-wrap h1 { font-size: 28px; line-height: 1.2; }
    .title-wrap p { margin-top: 4px; font-size: 13px; color: var(--muted); }

    .primary-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 0, 110, 0.22);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease;
    }

    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(255, 0, 110, 0.28); }

    .content {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 2.1fr) minmax(300px, 1fr);
      gap: 20px;
      padding: 20px;
      overflow: hidden;
    }

    .left, .right {
      min-height: 0;
      overflow: hidden;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tabs {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 16px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .tab {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all .25s ease;
    }

    .tab.active {
      background: rgba(255, 0, 110, 0.1);
      color: var(--primary);
      border-color: rgba(255, 0, 110, 0.18);
    }

    .cards {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding-right: 6px;
    }

    .cards::-webkit-scrollbar, .sidebar::-webkit-scrollbar { width: 7px; }
    .cards::-webkit-scrollbar-thumb, .sidebar::-webkit-scrollbar-thumb { background: rgba(255, 0, 110, 0.2); border-radius: 999px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      animation: rise .35s ease-out both;
    }

    .card:hover { transform: translateY(-4px); border-color: rgba(0, 217, 255, 0.34); box-shadow: 0 20px 36px rgba(22, 28, 45, 0.12); }

    .card-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .event-main { display: flex; gap: 12px; min-width: 0; }
    .event-icon {
      width: 52px; height: 52px; border-radius: 14px; display: grid; place-items: center; flex-shrink: 0;
      font-size: 24px; background: linear-gradient(135deg, rgba(255,0,110,.10), rgba(0,217,255,.10));
    }
    .event-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; word-break: break-word; }
    .event-meta { font-size: 12px; color: var(--muted); margin-bottom: 2px; }

    .badge {
      flex-shrink: 0;
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 999px; padding: 6px 10px; font-size: 11px; font-weight: 700;
      border: 1px solid rgba(0, 217, 255, 0.34); color: #0088a4; background: rgba(0, 217, 255, 0.10);
    }
    .badge.inactive { border-color: rgba(100, 116, 139, 0.22); color: var(--muted); background: rgba(100,116,139,.08); }

    .soon {
      background: #eff6fb;
      border: 1px solid #dceaf4;
      color: #52647c;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .progress-wrap { margin-bottom: 12px; }
    .progress-line {
      width: 100%; height: 8px; background: #edf2f7; border-radius: 999px; overflow: hidden; margin-top: 6px;
    }
    .progress-line > div { height: 100%; background: var(--gradient); }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 12px; border-top: 1px solid #edf0f7; }
    .small-btn {
      border: 1px solid transparent; border-radius: 10px; padding: 9px 12px; cursor: pointer;
      font-size: 12px; font-weight: 700; transition: all .2s ease;
    }
    .edit-btn { color: var(--primary); background: rgba(255, 0, 110, 0.08); border-color: rgba(255, 0, 110, 0.14); }
    .edit-btn:hover { background: var(--primary); color: #fff; }
    .delete-btn { color: #dc2626; background: rgba(220, 38, 38, 0.08); border-color: rgba(220, 38, 38, 0.16); }
    .delete-btn:hover { background: #dc2626; color: #fff; }

    .empty {
      grid-column: 1 / -1;
      display: grid; place-items: center;
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.88);
      border: 1px dashed #d6deee;
      border-radius: 18px;
    }
    .empty .icon { font-size: 42px; margin-bottom: 8px; opacity: .65; }

    .sidebar {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 6px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .panel-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 12px; }

    .calendar-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .calendar-nav { display: flex; gap: 8px; }
    .nav-btn {
      width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--border); background: #fff; cursor: pointer;
    }
    .nav-btn:hover { background: var(--bg); }

    .days, .dates { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .days div { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 6px 0; }
    .dates button {
      border: 0; border-radius: 50%; aspect-ratio: 1 / 1;
      background: transparent; color: #5f6f86; cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .dates button.today { background: var(--gradient); color: #fff; }
    .dates button.muted { opacity: .3; cursor: default; }

    .up-item, .pref-item {
      background: #f7fafc; border: 1px solid #e2e8f4; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
    }
    .up-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; display: flex; gap: 8px; align-items: center; }
    .up-meta { font-size: 11px; color: var(--muted); }
    .pref-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 0; }

    .switch { width: 18px; height: 18px; cursor: pointer; }

    .modal {
      position: fixed; inset: 0; z-index: 100;
      display: none; align-items: center; justify-content: center;
      background: rgba(9, 15, 28, 0.55); backdrop-filter: blur(4px); padding: 18px;
    }
    .modal.show { display: flex; }
    .modal-box {
      width: 100%; max-width: 560px; max-height: 92vh; overflow: auto;
      background: #fff; border-radius: 20px; box-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
    .modal-head h3 { font-size: 18px; }
    .close-btn { border: 0; background: transparent; color: var(--muted); font-size: 24px; cursor: pointer; }
    .form { padding: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px;
      font: inherit; font-size: 13px; color: var(--text);
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions-row { display: flex; justify-content: flex-end; gap: 10px; padding-top: 10px; }
    .secondary-btn { border: 1px solid var(--border); background: #fff; color: var(--text); border-radius: 12px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .secondary-btn:hover { background: #f8fafc; }

    .toast {
      position: fixed; right: 18px; bottom: 18px; z-index: 110;
      display: none; max-width: 360px; padding: 12px 14px; border-radius: 12px;
      background: #111827; color: #fff; box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      font-size: 13px;
    }
    .toast.show { display: block; }
    .toast.error { background: #b91c1c; }

    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 1100px) {
      .content { grid-template-columns: 1fr; overflow: auto; }
      .right { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    }

    @media (max-width: 760px) {
      html, body { overflow: auto; }
      .topbar { flex-direction: column; align-items: stretch; }
      .brand { flex-wrap: wrap; }
      .content { padding: 14px; }
      .right { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <button class="back-btn" onclick="go('/dashboard')">← Back</button>
        <div class="title-wrap">
          <h1>🗓️ Events & Reminders</h1>
          <p>Schedule wellness programs, challenges, and daily reminders in one place.</p>
        </div>
      </div>
      <button class="primary-btn" onclick="openCreateModal()">＋ Add Event</button>
    </header>

    <main class="content">
      <section class="left">
        <div class="tabs">
          <button class="tab active" data-tab="all" onclick="switchTab('all')">All</button>
          <button class="tab" data-tab="programs" onclick="switchTab('programs')">Programs</button>
          <button class="tab" data-tab="challenges" onclick="switchTab('challenges')">Challenges</button>
          <button class="tab" data-tab="reminders" onclick="switchTab('reminders')">Reminders</button>
        </div>

        <div class="cards" id="cards"></div>
      </section>

      <aside class="right sidebar">
        <div class="panel">
          <div class="panel-title">Calendar</div>
          <div class="calendar-head">
            <h3 id="calendarMonth" style="font-size:14px; font-weight:700;">Month</h3>
            <div class="calendar-nav">
              <button class="nav-btn" onclick="shiftMonth(-1)">←</button>
              <button class="nav-btn" onclick="shiftMonth(1)">→</button>
            </div>
          </div>
          <div class="days">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="dates" id="calendarDates"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Upcoming Reminders</div>
          <div id="upcoming"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Notification Settings</div>
          <div class="pref-item">
            <div class="pref-row">
              <span>Email notifications</span>
              <input id="emailToggle" class="switch" type="checkbox" />
            </div>
            <div class="pref-row" style="border-top:1px solid #e7edf5;">
              <span>SMS reminders</span>
              <input id="smsToggle" class="switch" type="checkbox" />
            </div>
          </div>
          <button class="primary-btn" style="width:100%;" onclick="saveNotificationSettings()">Save Settings</button>
        </div>
      </aside>
    </main>
  </div>

  <div class="modal" id="eventModal" aria-hidden="true">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitle">Add Event</h3>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <form class="form" id="eventForm" onsubmit="saveEvent(event)">
        <div class="field">
          <label for="eventTitle">Title *</label>
          <input id="eventTitle" required maxlength="200" placeholder="Morning Yoga Session" />
        </div>

        <div class="row">
          <div class="field">
            <label for="eventType">Type</label>
            <select id="eventType">
              <option value="yoga">Yoga</option>
              <option value="steps">Steps</option>
              <option value="fitness">Fitness</option>
              <option value="meditation">Meditation</option>
              <option value="wellness">Wellness</option>
            </select>
          </div>
          <div class="field">
            <label for="eventRepeat">Repeat</label>
            <select id="eventRepeat">
              <option value="none">Once</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="eventDate">Date *</label>
            <input id="eventDate" type="date" required />
          </div>
          <div class="field">
            <label for="eventTime">Time *</label>
            <input id="eventTime" type="time" required />
          </div>
        </div>

        <div class="field">
          <label for="eventMessage">Notes</label>
          <textarea id="eventMessage" placeholder="Optional notes..."></textarea>
        </div>

        <div class="field">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input id="sendConfirmation" type="checkbox" checked style="width:18px;" />
            Send confirmation message
          </label>
        </div>

        <div class="row">
          <div class="field">
            <label for="confirmEmail">Confirmation Email</label>
            <input id="confirmEmail" type="email" placeholder="user@example.com" />
          </div>
          <div class="field">
            <label for="confirmPhone">Confirmation Phone</label>
            <input id="confirmPhone" type="tel" placeholder="+1234567890" />
          </div>
        </div>

        <div class="actions-row">
          <button type="button" class="secondary-btn" onclick="closeModal()">Cancel</button>
          <button type="submit" class="primary-btn">Save Event</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const state = {
      tab: 'all',
      editingId: null,
      month: new Date(),
      contacts: {
        email: '',
        phone: '',
      },
      programs: [],
      challenges: [],
      reminders: [],
      upcoming: [],
      preferences: {
        email_notifications: true,
        sms_notifications: false,
      },
    };

    const ICONS = {
      yoga: '🧘',
      steps: '👟',
      fitness: '❤️',
      meditation: '🫁',
      wellness: '🥗',
      program: '📅',
      challenge: '🏆',
      reminder: '🔔',
      default: '📌',
    };

    function go(path) {
      window.location.href = path;
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    function toast(message, error = false) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.className = `toast show${error ? ' error' : ''}`;
      setTimeout(() => el.className = 'toast', 2800);
    }

    async function api(url, opts = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
      return data;
    }

    function formatTime(hhmm) {
      if (!hhmm) return '--';
      const [h, m] = hhmm.split(':').map(Number);
      const suffix = h >= 12 ? 'PM' : 'AM';
      const hour = ((h + 11) % 12) + 1;
      return `${hour}:${String(m).padStart(2, '0')} ${suffix}`;
    }

    function formatDate(value) {
      if (!value) return '--';
      return new Date(value).toLocaleDateString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric',
      });
    }

    function repeatText(days) {
      const list = String(days || '').split(',').map(s => s.trim()).filter(Boolean);
      if (list.length >= 7) return 'Daily';
      if (list.length === 1) return 'Weekly';
      return 'Once';
    }

    function daysForRepeat(repeatChoice, selectedDate) {
      if (repeatChoice === 'daily') return 'Mon,Tue,Wed,Thu,Fri,Sat,Sun';
      if (repeatChoice === 'weekly') {
        const d = selectedDate ? new Date(selectedDate) : new Date();
        return d.toLocaleDateString('en-US', { weekday: 'short' });
      }
      const d = selectedDate ? new Date(selectedDate) : new Date();
      return d.toLocaleDateString('en-US', { weekday: 'short' });
    }

    function iconFor(item) {
      return ICONS[item.reminder_type || item.event_type || item.kind] || ICONS.default;
    }

    function allItems() {
      return [
        ...state.programs.map(item => ({ ...item, kind: 'program' })),
        ...state.challenges.map(item => ({ ...item, kind: 'challenge' })),
        ...state.reminders.map(item => ({ ...item, kind: 'reminder' })),
      ];
    }

    function filteredItems() {
      const items = allItems();
      if (state.tab === 'all') return items;
      if (state.tab === 'programs') return items.filter(item => item.kind === 'program');
      if (state.tab === 'challenges') return items.filter(item => item.kind === 'challenge');
      return items.filter(item => item.kind === 'reminder');
    }

    function renderCards() {
      const container = document.getElementById('cards');
      const items = filteredItems();

      if (!items.length) {
        container.innerHTML = `
          <div class="empty">
            <div>
              <div class="icon">📭</div>
              <div style="font-weight:800; color: var(--text); margin-bottom: 4px;">No ${state.tab === 'all' ? 'events' : state.tab} yet</div>
              <div style="font-size: 13px;">Click “Add Event” to get started.</div>
            </div>
          </div>`;
        return;
      }

      container.innerHTML = items.map(item => {
        const isReminder = item.kind === 'reminder';
        const isProgram = item.kind === 'program';
        const statusActive = item.is_enabled !== false && item.is_active !== false;
        const progress = item.target_value ? Math.min(100, Math.round((Number(item.current_value || 0) / Number(item.target_value || 1)) * 100)) : null;
        const dueText = isReminder ? `${formatDate(new Date().toISOString())} • ${formatTime(item.reminder_time)}` : (item.start_datetime ? `${formatDate(item.start_datetime)}${item.end_datetime ? ` • ${formatTime(new Date(item.start_datetime).toTimeString().slice(0,5))}` : ''}` : '--');

        const actionButtons = isReminder
          ? `
            <div class="actions">
              <button class="small-btn edit-btn" onclick="openEditModal(${item.id})">✏ Edit</button>
              <button class="small-btn delete-btn" onclick="deleteItem(${item.id}, '${item.kind}')">🗑 Delete</button>
            </div>`
          : `
            <div class="actions">
              <button class="small-btn edit-btn" disabled title="Editing is available for reminders in this rebuild">View Only</button>
              <button class="small-btn delete-btn" disabled title="Deleting is available for reminders in this rebuild">Locked</button>
            </div>`;

        return `
          <article class="card">
            <div class="card-head">
              <div class="event-main">
                <div class="event-icon">${iconFor(item)}</div>
                <div style="min-width:0;">
                  <div class="event-title">${escapeHtml(item.title)}</div>
                  <div class="event-meta">${isReminder ? 'Reminder' : isProgram ? 'Program' : 'Challenge'}</div>
                  <div class="event-meta">${dueText}</div>
                </div>
              </div>
              <div class="badge ${statusActive ? '' : 'inactive'}">${statusActive ? '● Active' : '○ Inactive'}</div>
            </div>

            ${item.description || item.message ? `<div class="soon">${escapeHtml(item.description || item.message)}</div>` : ''}

            ${progress !== null ? `
              <div class="progress-wrap">
                <div class="event-meta">Progress: ${item.current_value || 0} / ${item.target_value} ${escapeHtml(item.unit || 'units')}</div>
                <div class="progress-line"><div style="width:${progress}%"></div></div>
              </div>
            ` : ''}

            ${actionButtons}
          </article>`;
      }).join('');
    }

    function renderUpcoming() {
      const container = document.getElementById('upcoming');
      const upcoming = state.upcoming.length ? state.upcoming : state.reminders.slice(0, 5).map(item => ({
        id: item.id,
        title: item.title,
        next_trigger: new Date().toISOString(),
        reminder_time: item.reminder_time,
        reminder_type: item.reminder_type,
      }));

      if (!upcoming.length) {
        container.innerHTML = '<div class="up-item"><div class="up-meta">No upcoming reminders.</div></div>';
        return;
      }

      container.innerHTML = upcoming.slice(0, 5).map(item => `
        <div class="up-item">
          <div class="up-title"><span>${iconFor(item)}</span>${escapeHtml(item.title)}</div>
          <div class="up-meta">${item.next_trigger ? formatDate(item.next_trigger) : 'Soon'} • ${formatTime(item.reminder_time)}</div>
        </div>`).join('');
    }

    function renderCalendar() {
      const month = state.month;
      const year = month.getFullYear();
      const monthIndex = month.getMonth();
      const firstDay = new Date(year, monthIndex, 1).getDay();
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const today = new Date();

      document.getElementById('calendarMonth').textContent = month.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      let html = '';
      for (let i = 0; i < firstDay; i++) html += '<button class="muted" disabled></button>';
      for (let day = 1; day <= daysInMonth; day++) {
        const isToday = day === today.getDate() && monthIndex === today.getMonth() && year === today.getFullYear();
        html += `<button class="${isToday ? 'today' : ''}">${day}</button>`;
      }
      document.getElementById('calendarDates').innerHTML = html;
    }

    function shiftMonth(delta) {
      state.month = new Date(state.month.getFullYear(), state.month.getMonth() + delta, 1);
      renderCalendar();
    }

    function switchTab(tab) {
      state.tab = tab;
      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      renderCards();
    }

    function openCreateModal() {
      state.editingId = null;
      document.getElementById('modalTitle').textContent = 'Add Event';
      document.getElementById('eventForm').reset();
      document.getElementById('eventDate').valueAsDate = new Date();
      document.getElementById('eventTime').value = '07:00';
      document.getElementById('sendConfirmation').checked = true;
      document.getElementById('confirmEmail').value = state.contacts.email || '';
      document.getElementById('confirmPhone').value = state.contacts.phone || '';
      document.getElementById('eventModal').classList.add('show');
      document.getElementById('eventModal').setAttribute('aria-hidden', 'false');
    }

    function openEditModal(id) {
      const item = allItems().find(x => x.id === id);
      if (!item) return;

      state.editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit Event';
      document.getElementById('eventTitle').value = item.title || '';
      document.getElementById('eventType').value = item.reminder_type || item.event_type || 'wellness';
      document.getElementById('eventRepeat').value = repeatText(item.days_of_week) === 'Daily' ? 'daily' : repeatText(item.days_of_week) === 'Weekly' ? 'weekly' : 'none';
      document.getElementById('eventDate').valueAsDate = new Date();
      document.getElementById('eventTime').value = item.reminder_time || '07:00';
      document.getElementById('eventMessage').value = item.message || item.description || '';
      document.getElementById('sendConfirmation').checked = true;
      document.getElementById('confirmEmail').value = state.contacts.email || '';
      document.getElementById('confirmPhone').value = state.contacts.phone || '';
      document.getElementById('eventModal').classList.add('show');
      document.getElementById('eventModal').setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      document.getElementById('eventModal').classList.remove('show');
      document.getElementById('eventModal').setAttribute('aria-hidden', 'true');
      state.editingId = null;
    }

    async function saveEvent(e) {
      e.preventDefault();

      const title = document.getElementById('eventTitle').value.trim();
      const type = document.getElementById('eventType').value;
      const repeat = document.getElementById('eventRepeat').value;
      const date = document.getElementById('eventDate').value;
      const time = document.getElementById('eventTime').value;
      const message = document.getElementById('eventMessage').value.trim();
      const sendConfirmation = document.getElementById('sendConfirmation').checked;
      const confirmationEmail = document.getElementById('confirmEmail').value.trim();
      const confirmationPhone = document.getElementById('confirmPhone').value.trim();

      if (!title || !date || !time) {
        toast('Title, date, and time are required.', true);
        return;
      }

      const payload = {
        title,
        reminder_type: type,
        reminder_time: time,
        days_of_week: daysForRepeat(repeat, date),
        message,
        is_enabled: true,
        send_confirmation: sendConfirmation,
        confirmation_email: confirmationEmail,
        confirmation_phone: confirmationPhone,
        confirmation_channel: confirmationEmail && confirmationPhone ? 'both' : (confirmationEmail ? 'email' : 'sms'),
      };

      try {
        const target = state.editingId ? `/api/events/reminders/${state.editingId}` : '/api/events/reminders';
        const method = state.editingId ? 'PUT' : 'POST';
        await api(target, { method, body: JSON.stringify(payload) });
        toast(state.editingId ? 'Event updated successfully.' : 'Event created successfully.');
        closeModal();
        await loadData();
      } catch (err) {
        toast(err.message || 'Failed to save event.', true);
      }
    }

    async function deleteItem(id, kind) {
      if (kind !== 'reminder') {
        toast('This rebuilt view currently manages reminders directly.', true);
        return;
      }
      if (!confirm('Delete this event?')) return;

      try {
        await api(`/api/events/reminders/${id}`, { method: 'DELETE' });
        toast('Event deleted.');
        await loadData();
      } catch (err) {
        toast(err.message || 'Failed to delete event.', true);
      }
    }

    async function saveNotificationSettings() {
      try {
        await api('/api/auth/preferences', {
          method: 'PUT',
          body: JSON.stringify({
            email_notifications: document.getElementById('emailToggle').checked,
            sms_notifications: document.getElementById('smsToggle').checked,
          }),
        });
        toast('Notification settings saved.');
      } catch (err) {
        toast(err.message || 'Failed to save settings.', true);
      }
    }

    async function loadData() {
      try {
        const overview = await api('/api/events/overview');
        state.programs = overview.programs || [];
        state.challenges = overview.challenges || [];
        state.reminders = overview.reminders || [];

        const upcomingRes = await api('/api/events/reminders/upcoming?hours=168');
        state.upcoming = upcomingRes.upcoming || [];

        renderCards();
        renderUpcoming();
      } catch (err) {
        toast(err.message || 'Failed to load events.', true);
      }
    }

    async function loadPreferences() {
      try {
        const data = await api('/api/auth/preferences');
        state.preferences = data.preferences || state.preferences;
        document.getElementById('emailToggle').checked = !!state.preferences.email_notifications;
        document.getElementById('smsToggle').checked = !!state.preferences.sms_notifications;
      } catch (_) {
        // Preferences are optional for this view.
      }
    }

    async function loadCurrentUserContacts() {
      try {
        const data = await api('/api/auth/me');
        const user = data.user || {};
        state.contacts.email = user.email || '';
        state.contacts.phone = user.phone || '';
        if (user.email) {
          document.getElementById('confirmEmail').value = user.email;
        }
        if (user.phone) {
          document.getElementById('confirmPhone').value = user.phone;
        }
      } catch (_) {
        // Contact autofill is optional.
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      renderCalendar();
      await Promise.all([loadData(), loadPreferences(), loadCurrentUserContacts()]);

      document.getElementById('eventModal').addEventListener('click', (e) => {
        if (e.target.id === 'eventModal') closeModal();
      });
    });
  </script>
</body>
</html>

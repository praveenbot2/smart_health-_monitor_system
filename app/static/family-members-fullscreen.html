<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Members - Smart Health Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            color-scheme: light;
            font-family: var(--serif-font-body, "Source Sans Pro", "Segoe UI", Arial, sans-serif);
            background: linear-gradient(135deg, rgba(5, 22, 48, 0.55) 0%, rgba(7, 51, 99, 0.32) 52%, rgba(8, 15, 36, 0.5) 100%), url('/static/images/module-bg.avif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.84);
            padding: 2rem;
            min-height: 100vh;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 1rem;
        }

        .header h1 {
            color: #333;
            font-size: 2rem;
        }

        .header-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--serif-accent, #FF006E);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 0, 110, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .member-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .member-card:hover {
            border-color: var(--serif-accent, #FF006E);
            box-shadow: 0 6px 20px rgba(255, 0, 110, 0.15);
        }

        .member-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--serif-accent, #FF006E);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .member-info h3 {
            color: #333;
            margin-bottom: 0.3rem;
        }

        .member-relation {
            color: #666;
            font-size: 0.9rem;
        }

        .member-details {
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid #e0e0e0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            align-items: center;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .member-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
        }

        .member-actions .btn {
            flex: 1 1 calc(50% - 0.25rem);
        }

        .health-score-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            background: #eef7ef;
            color: #2e7d32;
        }

        .health-score-chip.warning {
            background: #fff4e5;
            color: #ef6c00;
        }

        .health-score-chip.critical {
            background: #fdecea;
            color: #c62828;
        }

        .parent-alert-badge {
            margin-top: 0.5rem;
            display: inline-block;
            background: #fff4e5;
            color: #bf360c;
            border: 1px solid #ffcc80;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 999px;
            padding: 0.2rem 0.65rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 1rem;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--serif-accent, #FF006E);
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .form-actions .btn {
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 1rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .back-btn {
            padding: 0.7rem 1.5rem;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #d0d0d0;
        }

        .parent-alerts-panel {
            margin-bottom: 1.2rem;
            background: #fffaf3;
            border: 1px solid #ffe0b2;
            border-radius: 12px;
            padding: 1rem;
        }

        .parent-alerts-panel h3 {
            color: #e65100;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .parent-alert-item {
            font-size: 0.9rem;
            color: #5d4037;
            margin: 0.35rem 0;
        }
    
        /* ===== REAL-TIME ANIMATIONS ===== */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 110, 0.3), 0 0 20px rgba(0, 217, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.6), 0 0 30px rgba(0, 217, 255, 0.4); }
        }

        @keyframes slide-in-top {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slide-in-bottom {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-smooth {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes real-time-pulse {
            0%, 100% { 
                box-shadow: 0 0 8px rgba(255, 0, 110, 0.4), inset 0 0 8px rgba(0, 217, 255, 0.1);
            }
            50% { 
                box-shadow: 0 0 16px rgba(255, 0, 110, 0.6), inset 0 0 12px rgba(0, 217, 255, 0.2);
            }
        }

        @keyframes status-indicator {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Real-time enhanced styles */
        .header {
            animation: slide-in-top 0.6s ease-out;
        }

        .card, .alert-item, .event-card, .status-box, .metric-card {
            animation: slide-in-bottom 0.5s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }

        .status-badge {
            animation: real-time-pulse 1.5s ease-in-out infinite;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(0, 217, 255, 0.15);
            border: 1px solid #00D9FF;
            color: #00D9FF;
        }

        .status-badge.alert {
            background: rgba(255, 0, 110, 0.15);
            border: 1px solid #FF006E;
            color: #FF006E;
        }

        .status-badge.warning {
            background: rgba(255, 165, 0, 0.15);
            border: 1px solid #FFA500;
            color: #FFA500;
        }

        .button-group button, button.action-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .button-group button:hover, button.action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.3);
        }

        .button-group button:active, button.action-btn:active {
            transform: translateY(-1px);
        }

        /* Gradient backgrounds */
        .gradient-card {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.05) 0%, rgba(0, 217, 255, 0.05) 100%);
            border: 1px solid rgba(255, 0, 110, 0.1);
        }

        .gradient-card:hover {
            border-color: rgba(0, 217, 255, 0.3);
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.08) 0%, rgba(0, 217, 255, 0.08) 100%);
        }

        /* Real-time indicator dot */
        .real-time-dot::before {
            content: '●';
            display: inline-block;
            color: #00D9FF;
            animation: status-indicator 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }

        /* Smooth transitions for all interactive elements */
        * {
            transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF006E !important;
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1), 0 0 12px rgba(0, 217, 255, 0.2) !important;
        }

    </style>
    <link rel="stylesheet" href="/static/css/serif-design-system.css">
    <link rel="stylesheet" href="/static/css/advanced-design-system.css">
    <link rel="stylesheet" href="/static/css/advanced-components.css">
    <script defer src="/static/js/advanced-utilities.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>👨‍👩‍👧‍👦 Family Members</h1>
            <div class="header-buttons">
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fas fa-plus"></i> Add Family Member
                </button>
                <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
            </div>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

    <div id="parentAlertsPanel" class="parent-alerts-panel" style="display:none;"></div>

        <!-- Members Grid -->
        <div id="membersContainer" class="members-grid">
            <div class="empty-state">
                <div class="empty-state-icon">👥</div>
                <p>No family members added yet.</p>
                <p style="font-size: 0.9rem; margin-top: 0.5rem;">Click "Add Family Member" to get started.</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Family Member Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Family Member</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div id="modalAlert"></div>

            <form id="memberForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label for="relation">Relation *</label>
                        <select id="relation" required>
                            <option value="">Select relation...</option>
                            <option value="Mother">Mother</option>
                            <option value="Father">Father</option>
                            <option value="Sister">Sister</option>
                            <option value="Brother">Brother</option>
                            <option value="Spouse">Spouse</option>
                            <option value="Son">Son</option>
                            <option value="Daughter">Daughter</option>
                            <option value="Grandmother">Grandmother</option>
                            <option value="Grandfather">Grandfather</option>
                            <option value="Aunt">Aunt</option>
                            <option value="Uncle">Uncle</option>
                            <option value="Cousin">Cousin</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bloodType">Blood Type</label>
                        <select id="bloodType">
                            <option value="">Select...</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="contactNumber">Contact Phone</label>
                        <input type="tel" id="contactNumber">
                    </div>
                </div>

                <div class="form-group">
                    <label for="healthHistory">Health History</label>
                    <textarea id="healthHistory" placeholder="Medical conditions, past treatments, etc."></textarea>
                </div>

                <div class="form-group">
                    <label for="chronicConditions">Chronic Conditions</label>
                    <textarea id="chronicConditions" placeholder="Any ongoing chronic conditions..."></textarea>
                </div>

                <div class="form-group">
                    <label for="currentMedications">Current Medications</label>
                    <textarea id="currentMedications" placeholder="List any current medications..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Member
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="vitalsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Track Member Vitals</h2>
                <button class="close-btn" onclick="closeVitalsModal()">&times;</button>
            </div>
            <div id="vitalsModalAlert"></div>
            <form id="vitalsForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="heartRate">Heart Rate (bpm)</label>
                        <input type="number" id="heartRate" min="20" max="250">
                    </div>
                    <div class="form-group">
                        <label for="oxygenLevel">Oxygen Level (%)</label>
                        <input type="number" id="oxygenLevel" min="50" max="100" step="0.1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bpSystolic">BP Systolic</label>
                        <input type="number" id="bpSystolic" min="60" max="260">
                    </div>
                    <div class="form-group">
                        <label for="bpDiastolic">BP Diastolic</label>
                        <input type="number" id="bpDiastolic" min="40" max="180">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="temperature">Temperature (°C)</label>
                        <input type="number" id="temperature" min="30" max="45" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" min="1" max="300" step="0.1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="vitalsNotes">Notes</label>
                    <textarea id="vitalsNotes" placeholder="Optional note..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-heartbeat"></i> Save Vitals
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeVitalsModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentEditId = null;
        let currentVitalsMemberId = null;

        // Load family members on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadFamilyMembers();
            loadParentAlerts();
        });

        // Load family members
        async function loadFamilyMembers() {
            try {
                const response = await fetch(API_BASE + '/api/family/members');
                const data = await response.json();

                const container = document.getElementById('membersContainer');
                const members = data.family_members || [];

                if (members.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <p>No family members added yet.</p>
                            <p style="font-size: 0.9rem; margin-top: 0.5rem;">Click "Add Family Member" to get started.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = members.map(member => renderMemberCard(member)).join('');
            } catch (error) {
                showAlert('Failed to load family members: ' + error.message, 'error');
            }
        }

        // Render member card
        function renderMemberCard(member) {
            const initials = member.name.split(' ').map(n => n[0]).join('');
            const latestScore = member.latest_health_score;
            const latestVital = member.latest_vital;
            const score = latestScore?.score;
            const scoreClass = score == null ? '' : (score < 40 ? 'critical' : (score < 60 ? 'warning' : ''));
            const scoreLabel = score == null ? 'Not calculated' : `${score}/100`;
            const unresolved = member.unresolved_alerts_count || 0;
            
            return `
                <div class="member-card">
                    <div class="member-header">
                        <div class="member-avatar">${initials}</div>
                        <div class="member-info">
                            <h3>${member.name}</h3>
                            <div class="member-relation">${member.relation}</div>
                            <div class="health-score-chip ${scoreClass}">
                                <i class="fas fa-heart"></i> Score: ${scoreLabel}
                            </div>
                            ${member.is_parent && unresolved > 0 ? `<div class="parent-alert-badge">⚠️ Parent alerts: ${unresolved}</div>` : ''}
                        </div>
                    </div>

                    <div class="member-details">
                        ${member.age ? `<div class="detail-row"><span class="detail-label">Age</span><span class="detail-value">${member.age} years</span></div>` : ''}
                        ${member.blood_type ? `<div class="detail-row"><span class="detail-label">Blood Type</span><span class="detail-value">${member.blood_type}</span></div>` : ''}
                        ${member.contact_number ? `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${member.contact_number}</span></div>` : ''}
                        ${latestVital ? `
                            <div class="detail-row"><span class="detail-label">Latest HR</span><span class="detail-value">${latestVital.heart_rate || '-'} bpm</span></div>
                            <div class="detail-row"><span class="detail-label">Latest BP</span><span class="detail-value">${latestVital.blood_pressure_systolic || '-'} / ${latestVital.blood_pressure_diastolic || '-'}</span></div>
                            <div class="detail-row"><span class="detail-label">Latest O₂</span><span class="detail-value">${latestVital.oxygen_level || '-'}%</span></div>
                        ` : `<div class="detail-row"><span class="detail-label">Latest Vitals</span><span class="detail-value">No records</span></div>`}
                        
                        ${member.health_history ? `
                            <div class="detail-row" style="margin-top: 1rem;">
                                <span class="detail-label">Health History:</span>
                            </div>
                            <p style="color: #555; font-size: 0.9rem;">${member.health_history}</p>
                        ` : ''}
                        
                        ${member.chronic_conditions ? `
                            <div class="detail-row" style="margin-top: 1rem;">
                                <span class="detail-label">Chronic Conditions:</span>
                            </div>
                            <p style="color: #e74c3c; font-size: 0.9rem; font-weight: 500;">⚠️ ${member.chronic_conditions}</p>
                        ` : ''}
                        
                        ${member.current_medications ? `
                            <div class="detail-row" style="margin-top: 1rem;">
                                <span class="detail-label">Medications:</span>
                            </div>
                            <p style="color: #555; font-size: 0.9rem;">${member.current_medications}</p>
                        ` : ''}
                    </div>

                    <div class="member-actions">
                        <button class="btn btn-primary btn-small" onclick="editMember(${member.id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-secondary btn-small" onclick="openVitalsModal(${member.id})">
                            <i class="fas fa-heartbeat"></i> Vitals
                        </button>
                        <button class="btn btn-secondary btn-small" onclick="calculateMemberScore(${member.id})">
                            <i class="fas fa-chart-line"></i> Refresh Score
                        </button>
                        <button class="btn btn-danger btn-small" onclick="deleteMember(${member.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
        }

        // Open add modal
        function openAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Add Family Member';
            document.getElementById('memberForm').reset();
            document.getElementById('modalAlert').innerHTML = '';
            document.getElementById('memberModal').classList.add('active');
        }

        // Open edit modal
        async function editMember(memberId) {
            try {
                const response = await fetch(API_BASE + `/api/family/members/${memberId}`);
                const data = await response.json();
                const member = data.family_member;

                currentEditId = memberId;
                document.getElementById('modalTitle').textContent = 'Edit Family Member';
                document.getElementById('name').value = member.name;
                document.getElementById('age').value = member.age || '';
                document.getElementById('relation').value = member.relation;
                document.getElementById('bloodType').value = member.blood_type || '';
                document.getElementById('contactNumber').value = member.contact_number || '';
                document.getElementById('healthHistory').value = member.health_history || '';
                document.getElementById('chronicConditions').value = member.chronic_conditions || '';
                document.getElementById('currentMedications').value = member.current_medications || '';
                document.getElementById('modalAlert').innerHTML = '';
                document.getElementById('memberModal').classList.add('active');
            } catch (error) {
                showAlert('Failed to load member: ' + error.message, 'error');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('memberModal').classList.remove('active');
            currentEditId = null;
        }

        function openVitalsModal(memberId) {
            currentVitalsMemberId = memberId;
            document.getElementById('vitalsForm').reset();
            document.getElementById('vitalsModalAlert').innerHTML = '';
            document.getElementById('vitalsModal').classList.add('active');
        }

        function closeVitalsModal() {
            document.getElementById('vitalsModal').classList.remove('active');
            currentVitalsMemberId = null;
        }

        // Submit form
        document.getElementById('memberForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const memberData = {
                name: document.getElementById('name').value.trim(),
                age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
                relation: document.getElementById('relation').value,
                blood_type: document.getElementById('bloodType').value || null,
                contact_number: document.getElementById('contactNumber').value || null,
                health_history: document.getElementById('healthHistory').value || null,
                chronic_conditions: document.getElementById('chronicConditions').value || null,
                current_medications: document.getElementById('currentMedications').value || null
            };

            if (!memberData.name || !memberData.relation) {
                showModalAlert('Name and relation are required', 'error');
                return;
            }

            try {
                const method = currentEditId ? 'PUT' : 'POST';
                const url = currentEditId 
                    ? API_BASE + `/api/family/members/${currentEditId}`
                    : API_BASE + '/api/family/members';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(memberData)
                });

                const data = await response.json();

                if (response.ok) {
                    closeModal();
                    showAlert('Family member ' + (currentEditId ? 'updated' : 'added') + ' successfully!', 'success');
                    loadFamilyMembers();
                } else {
                    showModalAlert(data.error || 'Failed to save member', 'error');
                }
            } catch (error) {
                showModalAlert('Connection error: ' + error.message, 'error');
            }
        });

        // Delete member
        async function deleteMember(memberId) {
            if (!confirm('Are you sure you want to delete this family member?')) return;

            try {
                const response = await fetch(API_BASE + `/api/family/members/${memberId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Family member deleted successfully!', 'success');
                    loadFamilyMembers();
                } else {
                    showAlert(data.error || 'Failed to delete member', 'error');
                }
            } catch (error) {
                showAlert('Connection error: ' + error.message, 'error');
            }
        }

        async function calculateMemberScore(memberId) {
            try {
                const response = await fetch(API_BASE + `/api/family/members/${memberId}/health-score/calculate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                if (response.ok) {
                    showAlert(`Health score updated: ${data.health_score.score}/100`, 'success');
                    loadFamilyMembers();
                    loadParentAlerts();
                } else {
                    showAlert(data.error || 'Failed to calculate health score', 'error');
                }
            } catch (error) {
                showAlert('Connection error: ' + error.message, 'error');
            }
        }

        async function loadParentAlerts() {
            try {
                const response = await fetch(API_BASE + '/api/family/alerts/parents');
                const data = await response.json();
                const panel = document.getElementById('parentAlertsPanel');
                const alerts = data.alerts || [];

                if (!alerts.length) {
                    panel.style.display = 'none';
                    panel.innerHTML = '';
                    return;
                }

                panel.style.display = 'block';
                panel.innerHTML = `
                    <h3>⚠️ Parent Alerts (${alerts.length})</h3>
                    ${alerts.slice(0, 4).map(a => `<div class="parent-alert-item"><strong>${a.family_member_name} (${a.relation}):</strong> ${a.message}</div>`).join('')}
                `;
            } catch (error) {
                console.error('Failed to load parent alerts', error);
            }
        }

        document.getElementById('vitalsForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!currentVitalsMemberId) {
                showModalAlert('No member selected for vitals', 'error');
                return;
            }

            const payload = {
                heart_rate: numberOrNull(document.getElementById('heartRate').value),
                oxygen_level: numberOrNull(document.getElementById('oxygenLevel').value),
                blood_pressure_systolic: numberOrNull(document.getElementById('bpSystolic').value),
                blood_pressure_diastolic: numberOrNull(document.getElementById('bpDiastolic').value),
                temperature: numberOrNull(document.getElementById('temperature').value),
                weight: numberOrNull(document.getElementById('weight').value),
                notes: document.getElementById('vitalsNotes').value || null
            };

            try {
                const response = await fetch(API_BASE + `/api/family/members/${currentVitalsMemberId}/vitals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (response.ok) {
                    closeVitalsModal();
                    showAlert('Vitals saved successfully', 'success');
                    await calculateMemberScore(currentVitalsMemberId);
                    loadFamilyMembers();
                    loadParentAlerts();
                } else {
                    document.getElementById('vitalsModalAlert').innerHTML = `<div class="alert alert-error">${data.error || 'Failed to save vitals'}</div>`;
                }
            } catch (error) {
                document.getElementById('vitalsModalAlert').innerHTML = `<div class="alert alert-error">Connection error: ${error.message}</div>`;
            }
        });

        function numberOrNull(value) {
            if (value === null || value === undefined || value === '') {
                return null;
            }
            return Number(value);
        }

        // Show alert in main container
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);
            
            setTimeout(() => alert.remove(), 4000);
        }

        // Show alert in modal
        function showModalAlert(message, type) {
            const alertContainer = document.getElementById('modalAlert');
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        // Go back
        function goBack() {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
